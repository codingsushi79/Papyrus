name: Build Papyrus

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  server:
    name: Build Papyrus (${{ matrix.mc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - mc: '26.1.2'
            ref: ''
            java: '25'
          - mc: '1.21.11'
            ref: 'papyrus/1.21.11'
            java: '21'
          - mc: '1.21.10'
            ref: 'papyrus/1.21.10'
            java: '21'
          - mc: '1.21.8'
            ref: 'papyrus/1.21.8'
            java: '21'
          - mc: '1.21.4'
            ref: 'papyrus/1.21.4'
            java: '21'
    env:
      ORG_GRADLE_PROJECT_org.gradle.configuration-cache: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref != '' && matrix.ref || github.ref }}
          fetch-depth: 0

      - name: JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-enabled: false

      - name: Apply Patches and Build
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          ./gradlew applyPatches build syncPapyrusPaperclipJar --stacktrace --no-build-cache

      - name: Upload Test Results
        if: always() && matrix.mc == '26.1.2'
        uses: actions/upload-artifact@v4
        with:
          name: Test Results
          path: |
            **/build/test-results/test/TEST-*.xml

      - name: Prepare release jar
        run: |
          SOURCE=(papyrus-server/build/distributions/papyrus-paperclip-*.jar)
          if [ ! -f "${SOURCE[0]}" ]; then
            echo "Expected jar not found: ${SOURCE[0]}"
            ls -la papyrus-server/build/distributions/ 2>/dev/null || true
            exit 1
          fi
          cp "${SOURCE[0]}" "Papyrus-${{ matrix.mc }}.jar"
          ls -la "Papyrus-${{ matrix.mc }}.jar"

      - name: Upload Server Jar
        uses: actions/upload-artifact@v4
        with:
          name: papyrus-server-${{ matrix.mc }}
          path: Papyrus-${{ matrix.mc }}.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: papyrus-server-*
          path: artifacts
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'Papyrus-*.jar' -exec cp {} release/ \;
          EXPECTED=$(grep -v '^#' SUPPORTED_VERSIONS.txt | grep -v '^[[:space:]]*$' | wc -l | tr -d ' ')
          echo "Release files:"
          ls -la release/
          test "$(find release -maxdepth 1 -name 'Papyrus-*.jar' | wc -l | tr -d ' ')" -eq "$EXPECTED"
      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release view "$tag" --json assets -q '.assets[].id' | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${id}" || true
            done
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
