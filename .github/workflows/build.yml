name: Build Papyrus

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_org.gradle.configuration-cache: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-enabled: false

      - name: Apply Patches and Build
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          ./gradlew applyPatches --stacktrace --no-build-cache
          ./gradlew build createPaperclipJar syncPapyrusPaperclipJar --stacktrace --no-build-cache

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results
          path: |
            **/build/test-results/test/TEST-*.xml

      - name: Upload Server Jar
        uses: actions/upload-artifact@v4
        with:
          name: papyrus-server
          path: papyrus-server/build/distributions/papyrus-paperclip-*.jar
