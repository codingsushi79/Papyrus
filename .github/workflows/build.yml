name: Build Papyrus

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_org.gradle.configuration-cache: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-enabled: false

      - name: Apply Patches and Build
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          ./gradlew applyPatches --stacktrace --no-build-cache
          ./gradlew build createPaperclipJar syncPapyrusPaperclipJar --stacktrace --no-build-cache

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results
          path: |
            **/build/test-results/test/TEST-*.xml

      - name: Upload Server Jar
        uses: actions/upload-artifact@v4
        with:
          name: papyrus-server
          path: papyrus-server/build/distributions/papyrus-paperclip-*.jar

      - name: Prepare release jar
        if: startsWith(github.ref, 'refs/tags/v')
        id: release-jar
        run: |
          MC_VERSION=$(grep '^mcVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          SOURCE=(papyrus-server/build/distributions/papyrus-paperclip-*.jar)
          RELEASE_JAR="Papyrus-${MC_VERSION}.jar"
          cp "${SOURCE[0]}" "${RELEASE_JAR}"
          echo "path=${RELEASE_JAR}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release-jar.outputs.path }}
          fail_on_unmatched_files: true
